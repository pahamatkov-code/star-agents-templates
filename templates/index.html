<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Star Agents Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f9f9f9; }
        h1, h2 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f0f0f0; cursor: pointer; }
        .actions button { margin-right: 5px; }
        #pagination { margin-top: 15px; }
        #pagination button { margin: 0 5px; padding: 5px 10px; }
        #loginResult, #message { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🌟 Welcome to Star Agents 🌟</h1>

    <!-- Логін -->
    <form id="loginForm">
        <label>Email:</label>
        <input type="text" name="username" required>
        <label>Password:</label>
        <input type="password" name="password" required>
        <button type="submit">Login</button>
    </form>

    <p id="loginResult"></p>
    <button id="getAgentsBtn" style="display:none;">Get Agents</button>

    <!-- Пошук -->
    <div id="searchBar" style="display:none;">
        <label>Search:</label>
        <input type="text" id="searchInput" placeholder="Type name, role, department...">
    </div>

    <!-- Повідомлення -->
    <div id="message"></div>

    <!-- Таблиця агентів -->
    <div id="agentsList"></div>
    <div id="pagination"></div>

<script>
    let agentsData = [];
    let sortField = null;
    let sortAsc = true;
    let currentPage = 1;
    const pageSize = 5;

    const form = document.getElementById("loginForm");
    const getAgentsBtn = document.getElementById("getAgentsBtn");
    const agentsList = document.getElementById("agentsList");
    const searchBar = document.getElementById("searchBar");
    const searchInput = document.getElementById("searchInput");
    const pagination = document.getElementById("pagination");
    const loginResult = document.getElementById("loginResult");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const response = await fetch("/auth/login", {
            method: "POST",
            body: new URLSearchParams(formData),
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });
        if (!response.ok) {
            loginResult.textContent = "Login failed!";
            loginResult.style.color = "red";
            return;
        }
        const data = await response.json();
        if (data.access_token) {
            localStorage.setItem("token", data.access_token);
            loginResult.textContent = "Login successful! Welcome!";
            loginResult.style.color = "green";
            getAgentsBtn.style.display = "inline"; 
            searchBar.style.display = "block";
            await loadAgents();
        }
    });

    async function loadAgents() {
        const token = localStorage.getItem("token");
        const response = await fetch("/agents/", {
            headers: { "Authorization": `Bearer ${token}` }
        });
        if (!response.ok) {
            message.textContent = "Failed to load agents.";
            message.style.color = "red";
            return;
        }
        agentsData = await response.json();
        currentPage = 1;
        renderAgents();
    }

    function renderAgents() {
        const filter = searchInput.value.toLowerCase();
        let filtered = agentsData.filter(agent =>
            agent.name.toLowerCase().includes(filter) ||
            agent.role.toLowerCase().includes(filter) ||
            (agent.department || "").toLowerCase().includes(filter)
        );

        if (sortField) {
            filtered.sort((a, b) => {
                let valA = a[sortField]?.toString().toLowerCase() || "";
                let valB = b[sortField]?.toString().toLowerCase() || "";
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        const start = (currentPage - 1) * pageSize;
        const paginated = filtered.slice(start, start + pageSize);

        let html = `
            <h2>Agents List</h2>
            <table>
                <tr>
                    <th onclick="sortBy('id')">ID</th>
                    <th onclick="sortBy('name')">Name</th>
                    <th onclick="sortBy('role')">Role</th>
                    <th onclick="sortBy('email')">Email</th>
                    <th onclick="sortBy('department')">Department</th>
                    <th onclick="sortBy('skills')">Skills</th>
                    <th onclick="sortBy('status')">Status</th>
                    <th>Actions</th>
                </tr>
        `;
        paginated.forEach(agent => {
            html += `
                <tr>
                    <td>${agent.id}</td>
                    <td>${agent.name}</td>
                    <td>${agent.role}</td>
                    <td>${agent.email}</td>
                    <td>${agent.department || ""}</td>
                    <td>${agent.skills}</td>
                    <td>${agent.status ? "Active" : "Inactive"}</td>
                    <td class="actions">
                        <button onclick="deleteAgent(${agent.id})">Delete</button>
                        <button onclick="toggleStatus(${agent.id}, ${agent.status})">${agent.status ? "Deactivate" : "Activate"}</button>
                        <button onclick="buyAgent(${agent.id})">Buy</button>
                    </td>
                </tr>
            `;
        });
        html += "</table>";
        agentsList.innerHTML = html;

        renderPagination(filtered.length);
    }

    function renderPagination(totalItems) {
        const totalPages = Math.ceil(totalItems / pageSize);
        let html = "";
        if (totalPages > 1) {
            if (currentPage > 1) {
                html += `<button onclick="changePage(${currentPage - 1})">Previous</button>`;
            }
            html += ` Page ${currentPage} of ${totalPages} `;
            if (currentPage < totalPages) {
                html += `<button onclick="changePage(${currentPage + 1})">Next</button>`;
            }
        }
        pagination.innerHTML = html;
    }

    function changePage(page) {
        currentPage = page;
        renderAgents();
    }

    function sortBy(field) {
        if (sortField === field) {
            sortAsc = !sortAsc;
        } else {
            sortField = field;
            sortAsc = true;
        }
        renderAgents();
    }

    async function deleteAgent(id) {
        const token = localStorage.getItem("token");
        const response = await fetch(`/agent/${id}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${token}` }
        });
        if (response.ok) {
            message.textContent = "Agent deleted.";
            message.style.color = "green";
            await loadAgents();
        } else {
            message.textContent = "Failed to delete agent.";
            message.style.color = "red";
        }
    }

    async function toggleStatus(id, currentStatus) {
        const token = localStorage.getItem("token");
        const response = await fetch(`/agent/${id}`, {
            method: "PATCH",
            headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ status: !currentStatus })
        });
        if (response.ok) {
            message.textContent = "Status updated.";
            message.style.color = "green";
            await loadAgents();
        } else {
            message.textContent = "Failed to update status.";
            message.style.color = "red";
        }
    }

    async function buyAgent(id) {
        const token = localStorage.getItem("token");
        const response = await fetch(`/agents/purchase?agent_id=${id}`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${token}` }
        });
        if (response.ok) {
            message.textContent = "Agent purchased successfully!";
            message.style.color = "green";
        } else {
            message.textContent = "Failed to purchase agent.";
            message.style.color = "red";
        }
    }

    searchInput
