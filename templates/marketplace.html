<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Agents Marketplace</title>
    <!-- Підключаємо Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-center mb-4">AI Agents Marketplace</h1>

    <!-- Логін -->
    <div class="card p-3 mb-4">
        <form id="loginForm" class="row g-3">
            <div class="col-md-5">
                <input type="text" id="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="col-md-5">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </div>
        </form>
    </div>

    <!-- Кнопка для перегляду покупок -->
    <div class="text-center mb-4">
        <button id="myPurchasesBtn" class="btn btn-success">My Purchases</button>
    </div>

    <!-- Marketplace -->
    <div id="marketplace" class="row g-4"></div>

    <!-- Purchases -->
    <div id="purchases" class="mt-4"></div>

    <!-- Notifications -->
    <div id="notification" class="mt-3 text-center"></div>
</div>

<script>
    const marketplace = document.getElementById("marketplace");
    const notification = document.getElementById("notification");
    const loginForm = document.getElementById("loginForm");
    const purchasesDiv = document.getElementById("purchases");
    const myPurchasesBtn = document.getElementById("myPurchasesBtn");

    // Логін користувача
    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch("/users/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ username: email, password: password })
            });
            const data = await response.json();
            if (response.ok) {
                localStorage.setItem("token", data.access_token);
                notification.innerHTML = `<div class="alert alert-success">Logged in successfully!</div>`;
                loadAgents();
            } else {
                notification.innerHTML = `<div class="alert alert-danger">${data.detail}</div>`;
            }
        } catch (error) {
            notification.innerHTML = `<div class="alert alert-danger">Login failed</div>`;
        }
    });

    // Завантаження агентів
    async function loadAgents() {
        try {
            const response = await fetch("/marketplace/agents");
            const agents = await response.json();
            renderMarketplace(agents);
        } catch (error) {
            notification.innerHTML = `<div class="alert alert-danger">Error loading agents</div>`;
        }
    }

    // Відображення карток агентів
    function renderMarketplace(agents) {
        marketplace.innerHTML = "";
        agents.forEach(agent => {
            const card = document.createElement("div");
            card.className = "col-md-4";
            card.innerHTML = `
                <div class="card h-100 shadow-sm">
                    <img src="https://via.placeholder.com/400x200?text=${agent.name}" class="card-img-top" alt="${agent.name}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${agent.name}</h5>
                        <p class="card-text"><strong>Role:</strong> ${agent.role}</p>
                        <p class="card-text">${agent.description}</p>
                        <p class="card-text"><strong>Price:</strong> $${agent.price}</p>
                        <p class="card-text"><strong>Status:</strong> ${agent.status ? "Active" : "Inactive"}</p>
                        <button class="btn btn-primary mt-auto" onclick="buyAgent(${agent.id})">Buy</button>
                    </div>
                </div>
            `;
            marketplace.appendChild(card);
        });
    }

    // Покупка агента
    async function buyAgent(id) {
        const token = localStorage.getItem("token");
        if (!token) {
            notification.innerHTML = `<div class="alert alert-warning">You must be logged in to purchase</div>`;
            return;
        }

        try {
            const response = await fetch("/purchase/", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ agent_id: id })
            });
            const result = await response.json();
            if (response.ok) {
                notification.innerHTML = `<div class="alert alert-success">${result.detail}</div>`;
            } else {
                notification.innerHTML = `<div class="alert alert-danger">${result.detail}</div>`;
            }
        } catch (error) {
            notification.innerHTML = `<div class="alert alert-danger">Error processing purchase</div>`;
        }
    }

    // Перегляд покупок
    myPurchasesBtn.addEventListener("click", async () => {
        const token = localStorage.getItem("token");
        if (!token) {
            notification.innerHTML = `<div class="alert alert-warning">You must be logged in to view purchases</div>`;
            return;
        }

        try {
            const response = await fetch("/users/me/purchases", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const purchases = await response.json();
            if (response.ok) {
                renderPurchases(purchases);
            } else {
                notification.innerHTML = `<div class="alert alert-danger">${purchases.detail}</div>`;
            }
        } catch (error) {
            notification.innerHTML = `<div class="alert alert-danger">Error loading purchases</div>`;
        }
    });

    function renderPurchases(purchases) {
        purchasesDiv.innerHTML = "<h2>My Purchases</h2>";
        purchases.forEach(p => {
            const item = document.createElement("div");
            item.className = "alert alert-info";
            item.innerHTML = `<strong>${p.agent.name}</strong> — ${p.agent.role} ($${p.agent.price})`;
            purchasesDiv.appendChild(item);
        });
    }
</script>
</body>
</html>
