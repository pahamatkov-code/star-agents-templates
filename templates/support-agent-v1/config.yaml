name: Support Agent UA v1
description: Автоматичний агент підтримки клієнтів українською мовою (Prom.ua, OLX, Telegram, Instagram)
version: 1.0.0
author: Paha Matkovskiy
created: 2026-03-25

# Налаштування LLM
llm:
  provider: claude                          # можеш змінити на "grok" або "openai"
  model: claude-3-5-sonnet-20240620         # найкраща модель на березень 2026
  temperature: 0.65
  max_tokens: 800

# Ролі агента
roles:
  classifier:
    description: "Визначає тип запиту клієнта (питання про товар, статус замовлення, скарга, інше)"
    goal: "Точно класифікувати запит, щоб дати правильну відповідь"

  responder:
    description: "Головний агент підтримки"
    goal: "Дати максимально корисну, ввічливу та природну відповідь українською мовою"
    style: "Дружній, професійний, емпатичний, використовує звернення 'Ви'"

  escalator:
    description: "Вирішує, коли потрібно передати запит живому менеджеру"
    goal: "Не затягувати прості запити, але вчасно ескалувати складні"

# Інструменти (можна розширювати пізніше)
tools:
  check_faq:
    description: "Перевіряє базу знань FAQ"
    enabled: true

  get_order_status:
    description: "Отримує статус замовлення за номером"
    enabled: false        # поки що вимкнено, можна ввімкнути пізніше

  save_lead:
    description: "Зберігає контакт клієнта для подальшої роботи"
    enabled: true

# Загальні налаштування
default_settings:
  language: "uk"
  tone: "friendly-professional"
  max_response_length: 4      # максимум 4 речення за раз
  escalate_after: 3           # після 3 невдалих відповідей — ескалація
  timeout_seconds: 35

# Приклади використання
examples:
  - user: "Скільки коштує доставка?"
    expected: "Відповідь про умови доставки + посилання на правила"

  - user: "Коли прийде моє замовлення №12345?"
    expected: "Запит статусу замовлення"

  - user: "Товар не підійшов, хочу повернути"
    expected: "Емпатія + інструкція по поверненню або ескалація"

# Інформація для покупця
for_buyer:
  price: 49
  includes: "Повний код, Docker, інструкція, оновлення протягом 3 місяців"
  support: "Підтримка через Telegram @pahamatkov протягом 30 днів"