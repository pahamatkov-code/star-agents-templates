# Alembic configuration file

[alembic]
# Path to migration scripts
script_location = %(here)s/alembic

# Ensure Python path includes current directory
prepend_sys_path = .

# Path separator for multiple locations
path_separator = os

# Encoding for migration scripts
output_encoding = utf-8

# Database URL — тепер PostgreSQL замість SQLite
# ВАЖЛИВО: заміни user і pass на ті, що вказані у docker-compose.yml для сервісу db
sqlalchemy.url = postgresql://user:pass@db:5432/star_agents

[post_write_hooks]
# При бажанні можна додати автоматичне форматування чи лінтинг
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

