<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Login - Star Agents</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">⭐ Star Agents</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/agents">Агенти</a></li>
          <li class="nav-item"><a class="nav-link" href="/purchases">Мої покупки</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login form -->
  <div class="container mt-5">
    <h2 class="text-center mb-4">🔐 Увійдіть у Star Agents</h2>
    <form id="loginForm" class="card p-4 shadow-sm">
      <div class="mb-3">
        <label for="username" class="form-label">Email</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Пароль</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Увійти</button>
    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("http://127.0.0.1:8000/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            grant_type: "password",
            username: username,
            password: password
          })
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem("token", data.access_token);
          alert("✅ Успішний вхід!");
          window.location.href = "/agents";
        } else {
          alert("❌ Невірний логін або пароль");
        }
      } catch (err) {
        alert("⚠️ Помилка з'єднання з сервером");
      }
    });
  </script>
</body>
</html>
